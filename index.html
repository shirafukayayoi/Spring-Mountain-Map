<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D山岳ルートビューア - Koruldi Lakes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="antialiased text-slate-800">
  <div id="canvas-container"></div>
  <div id="labels-container" class="absolute inset-0 pointer-events-none overflow-hidden z-10"></div>

  <div class="absolute inset-0 pointer-events-none flex flex-col justify-between p-2 md:p-4 z-20">
    <div class="flex flex-col lg:flex-row gap-2 md:gap-3 items-start lg:items-start lg:justify-between">
      <div class="pointer-events-auto backdrop-blur-md bg-white/80 p-2 md:p-3 rounded-xl shadow-md border border-emerald-100 w-full max-w-md lg:w-[360px] lg:max-w-none flex flex-col gap-2">
        <div class="flex items-center justify-between gap-2">
          <div class="flex items-center gap-2 min-w-0">
            <div class="p-1.5 bg-emerald-100 rounded-lg text-emerald-700 shrink-0"><i data-lucide="mountain" class="w-4 h-4 md:w-5 md:h-5"></i></div>
            <h1 class="text-base md:text-lg font-black tracking-tight truncate">3D 山岳ルートビューア</h1>
          </div>
          <input type="file" id="gpx-input" accept=".gpx" class="hidden" />
          <button id="gpx-button" class="bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold py-1.5 px-3 rounded-lg shadow-sm flex items-center gap-1.5 text-xs shrink-0 hover:from-emerald-600 hover:to-teal-600 transition-all"><i data-lucide="upload-cloud" class="w-3.5 h-3.5"></i>GPX選択</button>
        </div>

        <div id="status-chip" class="flex items-center gap-1.5 text-[10px] md:text-xs text-emerald-700 font-medium pl-1">
          <i data-lucide="badge-check" class="w-3 h-3 shrink-0"></i>
          <span id="status-text">既定サンプルを読み込み中...</span>
        </div>

        <div class="flex items-center gap-2">
          <label for="sample-gpx-select" class="text-[11px] font-semibold text-slate-500 shrink-0">テンプレート</label>
          <select id="sample-gpx-select" class="w-full rounded-md border border-slate-300 bg-white/90 px-2 py-1 text-xs text-slate-700"></select>
        </div>

        <div id="default-gpx-error" class="hidden bg-rose-50 border border-rose-200 rounded-lg p-2 text-xs text-rose-700">
          <div class="flex items-start gap-2">
            <i data-lucide="triangle-alert" class="w-4 h-4 mt-0.5 shrink-0"></i>
            <div class="flex-1">
              <p id="default-gpx-error-text">既定GPXの読み込みに失敗しました。手動でGPXを選択してください。</p>
              <button id="gpx-button-fallback" class="mt-2 px-2 py-1 rounded-md bg-rose-600 text-white text-[11px] font-semibold hover:bg-rose-700">GPXを選択</button>
            </div>
          </div>
        </div>
      </div>

      <div class="pointer-events-auto backdrop-blur-md bg-white/80 p-2 md:p-3 rounded-xl shadow-md border border-sky-100 w-full max-w-md lg:w-[390px] lg:max-w-none lg:ml-auto lg:max-h-[72vh] overflow-y-auto">
        <h2 class="text-xs font-bold text-slate-600 mb-2">ルート情報</h2>
        <div class="grid grid-cols-2 gap-2 text-xs">
          <div class="bg-white/70 rounded-lg p-2 border border-slate-100"><p class="text-slate-400">開始点</p><p id="info-start" class="font-semibold">-</p></div>
          <div class="bg-white/70 rounded-lg p-2 border border-slate-100"><p class="text-slate-400">最高点</p><p id="info-summit" class="font-semibold">-</p></div>
          <div class="bg-white/70 rounded-lg p-2 border border-slate-100"><p class="text-slate-400">終了点</p><p id="info-end" class="font-semibold">-</p></div>
          <div class="bg-white/70 rounded-lg p-2 border border-slate-100"><p class="text-slate-400">距離</p><p id="info-distance" class="font-semibold">-</p></div>
          <div class="bg-white/70 rounded-lg p-2 border border-slate-100"><p class="text-slate-400">標高 (最小 - 最大)</p><p id="info-ele-range" class="font-semibold">-</p></div>
          <div class="bg-white/70 rounded-lg p-2 border border-slate-100"><p class="text-slate-400">累積標高 (上り / 下り)</p><p id="info-ele-gain" class="font-semibold">-</p></div>
        </div>
        <p id="info-track-name" class="text-[11px] text-slate-500 mt-2 truncate">トラック名: -</p>

        <div class="mt-2 pt-2 border-t border-slate-200/80">
          <div class="flex items-center justify-between gap-2 mb-2">
            <h3 class="text-xs font-bold text-slate-600">レース</h3>
            <span id="race-status" class="text-[11px] font-medium text-slate-500">GPX読込待ち</span>
          </div>
          <div class="flex items-center gap-1.5">
            <button id="race-start" class="race-btn race-btn-start" disabled>開始</button>
            <button id="race-pause" class="race-btn race-btn-pause" disabled>一時停止</button>
            <button id="race-reset" class="race-btn race-btn-reset" disabled>リセット</button>
          </div>
          <div class="mt-2">
            <p class="text-[11px] font-semibold text-slate-500 mb-1">カメラ</p>
            <div class="flex flex-wrap items-center gap-1.5">
              <button id="camera-free" class="camera-btn camera-btn-active">自由</button>
              <button id="camera-chase" class="camera-btn">追従</button>
              <button id="camera-front" class="camera-btn">先回り</button>
              <button id="camera-cinematic" class="camera-btn">シネマ</button>
            </div>
          </div>

          <div class="mt-2 pt-2 border-t border-slate-200/80">
            <div class="flex items-center justify-between gap-2 mb-2">
              <h4 class="text-xs font-bold text-slate-600">推しランナー設定</h4>
              <button id="cheer-button" class="cheer-btn" disabled>応援ブースト</button>
            </div>

            <div class="grid gap-2 text-[11px] text-slate-600">
              <div class="grid gap-1">
                <label for="support-runner-select" class="font-semibold">推しランナー</label>
                <select id="support-runner-select" class="w-full rounded-md border border-slate-300 bg-white/90 px-2 py-1 text-xs text-slate-700"></select>
              </div>

              <div class="grid gap-1">
                <div class="flex items-center justify-between">
                  <label for="support-speed-slider" class="font-semibold">速度補正</label>
                  <span id="support-speed-value" class="text-slate-500">100%</span>
                </div>
                <input id="support-speed-slider" type="range" min="80" max="160" step="1" value="100" />
              </div>

              <div class="grid gap-1">
                <div class="flex items-center justify-between">
                  <label for="support-finish-slider" class="font-semibold">終盤補正</label>
                  <span id="support-finish-value" class="text-slate-500">100%</span>
                </div>
                <input id="support-finish-slider" type="range" min="80" max="170" step="1" value="100" />
              </div>
            </div>

            <div class="mt-2">
              <div class="flex items-center justify-between text-[11px] text-slate-500 mb-1">
                <span>応援ゲージ</span>
                <span id="cheer-percent">0%</span>
              </div>
              <div class="cheer-meter-track">
                <div id="cheer-meter-fill" class="cheer-meter-fill"></div>
              </div>
            </div>

            <div class="mt-2">
              <div class="flex items-center justify-between text-[11px] text-slate-500 mb-1">
                <span>応援エネルギー</span>
                <span id="cheer-energy-percent">100%</span>
              </div>
              <div class="cheer-meter-track">
                <div id="cheer-energy-fill" class="cheer-energy-fill"></div>
              </div>
            </div>

            <div class="mt-2">
              <div class="flex items-center justify-between text-[11px] text-slate-500 mb-1">
                <span>過熱ペナルティ</span>
                <span id="overheat-percent">0%</span>
              </div>
              <div class="cheer-meter-track">
                <div id="overheat-fill" class="overheat-fill"></div>
              </div>
            </div>

            <div class="mt-2 flex items-center justify-between text-[11px] text-slate-500">
              <span id="support-status-text">推し設定で応援可能</span>
              <span id="support-budget-text">配分 0%</span>
            </div>
          </div>

          <div id="race-board" class="race-board mt-2"></div>
        </div>
      </div>
    </div>

    <div class="pointer-events-auto flex flex-col lg:flex-row gap-2 md:gap-3 items-stretch mt-auto">
      <div class="w-full lg:w-[42%] backdrop-blur-md bg-white/80 p-2 rounded-xl shadow-md border border-sky-100">
        <div class="flex items-center justify-between mb-2"><h2 class="text-xs font-bold text-slate-600">2D 標準地図</h2><span class="text-[10px] text-slate-500">3Dと同じGPXを表示</span></div>
        <div id="map"></div>
      </div>
      <div class="w-full lg:flex-1 overflow-x-auto scrollbar-hide pb-1"><div id="spot-list-container" class="flex flex-row gap-2 w-max px-1"></div></div>
    </div>
  </div>

  <div id="loading" class="absolute inset-0 bg-white/88 backdrop-blur-sm z-50 flex flex-col items-center justify-center transition-opacity duration-300 opacity-0 pointer-events-none">
    <i data-lucide="loader-circle" class="w-12 h-12 text-emerald-500 animate-spin mb-4"></i>
    <h2 id="loading-text" class="text-xl font-bold text-slate-700">GPXを読み込み中...</h2>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
